name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch all publish workflows
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = [
              'release-npm.yml',
              'release-pypi.yml',
              'release-go.yml',
              'release-maven.yml',
              'release-crates.yml',
              'release-php.yml',
              'release-rubygems.yml',
              'release-kotlin.yml',
              'release-nuget.yml',
              'release-cli.yml',
            ];

            for (const workflow of workflows) {
              try {
                console.log(`Dispatching ${workflow}`);
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow,
                  ref: 'master',
                });
              } catch (err) {
                console.log(`Warning: failed to dispatch ${workflow}: ${err.message}`);
              }
            }
