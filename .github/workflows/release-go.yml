name: Publish Go

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Verify Go module
        working-directory: sdk/go
        run: |
          go mod verify
          echo "Go module published via git tag"
