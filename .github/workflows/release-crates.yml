name: Publish crates.io

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: |
          cp README.md sdk/rust/README.md
          cd sdk/rust
          cargo publish --token "$CRATES_TOKEN" || echo "⚠️ Publish failed (version may already exist)"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
