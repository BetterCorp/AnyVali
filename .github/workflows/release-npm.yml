name: Publish npm

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: npm publish --access public || echo "⚠️ Publish failed (version may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM2_TOKEN_PUB }}
