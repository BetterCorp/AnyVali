name: Release CLI Binaries

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: anyvali-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: anyvali-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: anyvali-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: anyvali-darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            name: blacksmith-2vcpu-windows-2025

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd cli
          go build -ldflags="-s -w" -o ../${{ matrix.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  upload:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find CLI release
        id: find
        run: |
          tag=$(git tag --sort=-v:refname | grep '^cli-v' | head -1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Found tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x binaries/anyvali-linux-* binaries/anyvali-darwin-*

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > checksums-sha256.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.find.outputs.tag }}
          files: |
            binaries/anyvali-linux-amd64
            binaries/anyvali-linux-arm64
            binaries/anyvali-darwin-amd64
            binaries/anyvali-darwin-arm64
            binaries/anyvali-windows-amd64.exe
            binaries/checksums-sha256.txt
