name: Build Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-npm.yml
    secrets: inherit

  publish-pypi:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-pypi.yml
    secrets: inherit

  publish-go:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-go.yml
    secrets: inherit

  publish-crates:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-crates.yml
    secrets: inherit

  publish-maven:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-maven.yml
    secrets: inherit

  publish-nuget:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-nuget.yml
    secrets: inherit

  publish-rubygems:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-rubygems.yml
    secrets: inherit

  publish-kotlin:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-kotlin.yml
    secrets: inherit

  publish-cli:
    needs: build-release
    if: needs.build-release.outputs.releases_created == 'true'
    uses: ./.github/workflows/release-cli.yml
    secrets: inherit
