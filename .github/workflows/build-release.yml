name: Build Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_publish_all:
        description: Force publish all registry-backed SDKs
        required: true
        default: false
        type: boolean
      force_publish_js:
        description: Force publish JavaScript SDK to npm
        required: true
        default: false
        type: boolean
      force_publish_python:
        description: Force publish Python SDK to PyPI
        required: true
        default: false
        type: boolean
      force_publish_go:
        description: Force verify Go module tag
        required: true
        default: false
        type: boolean
      force_publish_java:
        description: Force publish Java SDK to Maven Central
        required: true
        default: false
        type: boolean
      force_publish_kotlin:
        description: Force publish Kotlin SDK to Maven Central
        required: true
        default: false
        type: boolean
      force_publish_rust:
        description: Force publish Rust SDK to crates.io
        required: true
        default: false
        type: boolean
      force_publish_csharp:
        description: Force publish C# SDK to NuGet
        required: true
        default: false
        type: boolean
      force_publish_ruby:
        description: Force publish Ruby SDK to RubyGems
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  build-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      js_released: ${{ steps.release.outputs['js--release_created'] }}
      python_released: ${{ steps.release.outputs['python--release_created'] }}
      go_released: ${{ steps.release.outputs['go--release_created'] }}
      rust_released: ${{ steps.release.outputs['rust--release_created'] }}
      java_released: ${{ steps.release.outputs['java--release_created'] }}
      kotlin_released: ${{ steps.release.outputs['kotlin--release_created'] }}
      csharp_released: ${{ steps.release.outputs['csharp--release_created'] }}
      ruby_released: ${{ steps.release.outputs['ruby--release_created'] }}
      cli_released: ${{ steps.release.outputs['cli--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Add release PR summary
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/github-script@v8
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        with:
          script: |
            const prs = JSON.parse(process.env.RELEASE_PRS || '[]');
            const markerStart = '<!-- anyvali-release-summary -->';
            const markerEnd = '<!-- /anyvali-release-summary -->';
            const labels = {
              anyvali: { area: 'Core release', publish: 'GitHub release only' },
              js: { area: 'JavaScript SDK', publish: 'npm' },
              python: { area: 'Python SDK', publish: 'PyPI' },
              go: { area: 'Go SDK', publish: 'Go module tag' },
              rust: { area: 'Rust SDK', publish: 'crates.io' },
              java: { area: 'Java SDK', publish: 'Maven Central' },
              kotlin: { area: 'Kotlin SDK', publish: 'Maven Central' },
              csharp: { area: 'C# SDK', publish: 'NuGet' },
              ruby: { area: 'Ruby SDK', publish: 'RubyGems' },
              php: { area: 'PHP SDK', publish: 'GitHub release only' },
              cpp: { area: 'C++ SDK', publish: 'GitHub release only' },
              cli: { area: 'CLI binaries', publish: 'GitHub release assets' },
            };

            function releaseRows(body) {
              const rows = [];
              const re = /<details><summary>([^:<]+):\s*([^<]+)<\/summary>/g;
              for (const match of body.matchAll(re)) {
                const component = match[1].trim();
                const version = match[2].trim();
                const meta = labels[component] || {
                  area: component,
                  publish: 'GitHub release',
                };
                rows.push(
                  `| ${meta.area} | \`v${version.replace(/^v/, '')}\` | ${meta.publish} |`
                );
              }
              return rows;
            }

            function changedAreas(files) {
              const areas = new Set();
              for (const file of files) {
                const path = file.filename;
                if (path === 'CHANGELOG.md' || path === '.release-please-manifest.json') areas.add('anyvali');
                else if (path.startsWith('sdk/js/')) areas.add('js');
                else if (path.startsWith('sdk/python/')) areas.add('python');
                else if (path.startsWith('sdk/go/')) areas.add('go');
                else if (path.startsWith('sdk/rust/')) areas.add('rust');
                else if (path.startsWith('sdk/java/')) areas.add('java');
                else if (path.startsWith('sdk/kotlin/')) areas.add('kotlin');
                else if (path.startsWith('sdk/csharp/')) areas.add('csharp');
                else if (path.startsWith('sdk/ruby/')) areas.add('ruby');
                else if (path.startsWith('sdk/php/')) areas.add('php');
                else if (path.startsWith('sdk/cpp/')) areas.add('cpp');
                else if (path.startsWith('cli/')) areas.add('cli');
              }
              return [...areas].map(area => labels[area]?.area || area).sort();
            }

            for (const pr of prs) {
              const number = pr.number;
              const { data: pull } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
              });
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
                per_page: 100,
              });

              const rows = releaseRows(pull.body || '');
              const areas = changedAreas(files);
              const summary = [
                markerStart,
                '## Release Impact',
                '',
                rows.length
                  ? '| Package | Version | Publish after merge |\n| --- | --- | --- |\n' + rows.join('\n')
                  : '_No package release entries were found in the generated release notes._',
                '',
                `Changed release areas: ${areas.length ? areas.map(a => `\`${a}\``).join(', ') : '`none detected`'}.`,
                '',
                'Merging this PR creates the listed GitHub releases and starts only the matching publish jobs.',
                markerEnd,
              ].join('\n');

              const current = pull.body || '';
              const block = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`);
              let body;
              if (block.test(current)) {
                body = current.replace(block, summary);
              } else {
                body = current.replace(/---\n/, `---\n\n${summary}\n\n`);
              }

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
                body,
              });
            }

  force-publish-sdks:
    needs: build-release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.force_publish_all ||
       inputs.force_publish_python ||
       inputs.force_publish_go ||
       inputs.force_publish_java ||
       inputs.force_publish_kotlin ||
       inputs.force_publish_rust ||
       inputs.force_publish_csharp ||
       inputs.force_publish_ruby)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Dispatch selected SDK publish workflows
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_ALL: ${{ inputs.force_publish_all }}
          FORCE_PYTHON: ${{ inputs.force_publish_python }}
          FORCE_GO: ${{ inputs.force_publish_go }}
          FORCE_JAVA: ${{ inputs.force_publish_java }}
          FORCE_KOTLIN: ${{ inputs.force_publish_kotlin }}
          FORCE_RUST: ${{ inputs.force_publish_rust }}
          FORCE_CSHARP: ${{ inputs.force_publish_csharp }}
          FORCE_RUBY: ${{ inputs.force_publish_ruby }}
        shell: bash
        run: |
          dispatch() {
            local enabled="$1"
            local workflow="$2"

            if [[ "$FORCE_ALL" == "true" || "$enabled" == "true" ]]; then
              echo "Dispatching $workflow on ${GITHUB_REF_NAME}"
              gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref "${GITHUB_REF_NAME}"
            fi
          }

          dispatch "$FORCE_PYTHON" release-pypi.yml
          dispatch "$FORCE_GO" release-go.yml
          dispatch "$FORCE_JAVA" release-maven.yml
          dispatch "$FORCE_KOTLIN" release-kotlin.yml
          dispatch "$FORCE_RUST" release-crates.yml
          dispatch "$FORCE_CSHARP" release-nuget.yml
          dispatch "$FORCE_RUBY" release-rubygems.yml

  # --- Publish jobs: only run when releases are actually created ---
  # Releases are created when the release PR is merged.
  # On a normal push: Release Please creates/updates the release PR (no releases).
  # On the release PR merge: Release Please creates GitHub releases + tags.

  publish-npm:
    needs: build-release
    if: >-
      needs.build-release.outputs.js_released == 'true' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.force_publish_all || inputs.force_publish_js))
    uses: ./.github/workflows/release-npm.yml
    secrets: inherit

  publish-pypi:
    needs: build-release
    if: needs.build-release.outputs.python_released == 'true'
    uses: ./.github/workflows/release-pypi.yml
    secrets: inherit

  publish-go:
    needs: build-release
    if: needs.build-release.outputs.go_released == 'true'
    uses: ./.github/workflows/release-go.yml
    secrets: inherit

  publish-crates:
    needs: build-release
    if: needs.build-release.outputs.rust_released == 'true'
    uses: ./.github/workflows/release-crates.yml
    secrets: inherit

  publish-maven:
    needs: build-release
    if: needs.build-release.outputs.java_released == 'true'
    uses: ./.github/workflows/release-maven.yml
    secrets: inherit

  publish-nuget:
    needs: build-release
    if: needs.build-release.outputs.csharp_released == 'true'
    uses: ./.github/workflows/release-nuget.yml
    secrets: inherit

  publish-rubygems:
    needs: build-release
    if: needs.build-release.outputs.ruby_released == 'true'
    uses: ./.github/workflows/release-rubygems.yml
    secrets: inherit

  publish-kotlin:
    needs: build-release
    if: needs.build-release.outputs.kotlin_released == 'true'
    uses: ./.github/workflows/release-kotlin.yml
    secrets: inherit

  publish-cli:
    needs: build-release
    if: needs.build-release.outputs.cli_released == 'true'
    uses: ./.github/workflows/release-cli.yml
    secrets: inherit
