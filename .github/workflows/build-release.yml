name: Build Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  build-release:
    # Only run after successful CI on master (not on skipped CI from release commits)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      js_released: ${{ steps.release.outputs['js--release_created'] }}
      python_released: ${{ steps.release.outputs['python--release_created'] }}
      go_released: ${{ steps.release.outputs['go--release_created'] }}
      rust_released: ${{ steps.release.outputs['rust--release_created'] }}
      java_released: ${{ steps.release.outputs['java--release_created'] }}
      kotlin_released: ${{ steps.release.outputs['kotlin--release_created'] }}
      csharp_released: ${{ steps.release.outputs['csharp--release_created'] }}
      ruby_released: ${{ steps.release.outputs['ruby--release_created'] }}
      cli_released: ${{ steps.release.outputs['cli--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # Auto-merge the release PR immediately, then lock it.
      # If merge fails for any reason, close the PR so it can't be merged manually.
      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        uses: actions/github-script@v7
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        with:
          script: |
            const pr = JSON.parse(process.env.RELEASE_PR);
            if (!pr || !pr.number) return;

            // Lock the PR immediately so nobody can manually merge
            try {
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                lock_reason: 'resolved',
              });
              console.log(`Locked PR #${pr.number}`);
            } catch (e) {
              console.log(`Warning: could not lock PR: ${e.message}`);
            }

            // Merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `chore: release ${pr.title}`,
              });
              console.log(`Merged PR #${pr.number}`);
            } catch (e) {
              // If merge fails, close the PR so it can't be merged manually
              console.log(`Merge failed: ${e.message}`);
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              console.log(`Closed PR #${pr.number} to prevent manual merge`);
              core.setFailed(`Auto-merge failed for PR #${pr.number}: ${e.message}`);
            }

  # --- Publish jobs: only run when releases are actually created ---

  publish-npm:
    needs: build-release
    if: needs.build-release.outputs.js_released == 'true'
    uses: ./.github/workflows/release-npm.yml
    secrets: inherit

  publish-pypi:
    needs: build-release
    if: needs.build-release.outputs.python_released == 'true'
    uses: ./.github/workflows/release-pypi.yml
    secrets: inherit

  publish-go:
    needs: build-release
    if: needs.build-release.outputs.go_released == 'true'
    uses: ./.github/workflows/release-go.yml
    secrets: inherit

  publish-crates:
    needs: build-release
    if: needs.build-release.outputs.rust_released == 'true'
    uses: ./.github/workflows/release-crates.yml
    secrets: inherit

  publish-maven:
    needs: build-release
    if: needs.build-release.outputs.java_released == 'true'
    uses: ./.github/workflows/release-maven.yml
    secrets: inherit

  publish-nuget:
    needs: build-release
    if: needs.build-release.outputs.csharp_released == 'true'
    uses: ./.github/workflows/release-nuget.yml
    secrets: inherit

  publish-rubygems:
    needs: build-release
    if: needs.build-release.outputs.ruby_released == 'true'
    uses: ./.github/workflows/release-rubygems.yml
    secrets: inherit

  publish-kotlin:
    needs: build-release
    if: needs.build-release.outputs.kotlin_released == 'true'
    uses: ./.github/workflows/release-kotlin.yml
    secrets: inherit

  publish-cli:
    needs: build-release
    if: needs.build-release.outputs.cli_released == 'true'
    uses: ./.github/workflows/release-cli.yml
    secrets: inherit
