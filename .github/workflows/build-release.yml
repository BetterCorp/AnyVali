name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - name: Check npm version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "anyvali@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.version.outputs.exists != 'true'
        run: npm publish --access public

  pypi:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          cp README.md sdk/python/README.md
          cd sdk/python
          pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          skip-existing: true

  go:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Verify Go module
        working-directory: sdk/go
        run: go mod verify

  maven:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Publish to Maven Central
        run: mvn -B deploy -DskipTests -Prelease
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  kotlin:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk/kotlin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        run: gradle --no-daemon publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  crates:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: |
          cp README.md sdk/rust/README.md
          cd sdk/rust
          cargo publish --token "$CRATES_TOKEN"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  nuget:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk/csharp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore AnyVali.sln
      - run: dotnet build AnyVali.sln --configuration Release --no-restore
      - run: dotnet pack --configuration Release --no-build -o nupkgs
      - name: Publish to NuGet
        run: dotnet nuget push nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  rubygems:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk/ruby
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build and publish gem
        run: |
          cp ../../README.md README.md
          mkdir -p ~/.gem
          cat <<CRED > ~/.gem/credentials
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          CRED
          chmod 0600 ~/.gem/credentials
          gem build anyvali.gemspec
          gem push anyvali-*.gem
          rm -f ~/.gem/credentials

  cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: anyvali-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: anyvali-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: anyvali-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: anyvali-darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            name: anyvali-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd cli
          go build -ldflags="-s -w" -o ../${{ matrix.name }} .
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  cli-upload:
    needs: cli
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true
      - name: Make binaries executable
        run: chmod +x binaries/anyvali-linux-* binaries/anyvali-darwin-*
      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > checksums-sha256.txt
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          fail_on_unmatched_files: true
          files: |
            binaries/anyvali-linux-amd64
            binaries/anyvali-linux-arm64
            binaries/anyvali-darwin-amd64
            binaries/anyvali-darwin-arm64
            binaries/anyvali-windows-amd64.exe
            binaries/checksums-sha256.txt
