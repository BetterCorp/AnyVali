name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish-npm:
    if: startsWith(github.event.release.tag_name, 'js-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM2_TOKEN_PUB }}

  publish-pypi:
    if: startsWith(github.event.release.tag_name, 'python-v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          cp README.md sdk/python/README.md
          cd sdk/python
          pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-go:
    if: startsWith(github.event.release.tag_name, 'go-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Verify Go module
        working-directory: sdk/go
        run: |
          go mod verify
          echo "Go module published via git tag: ${{ github.ref_name }}"

  publish-crates:
    if: startsWith(github.event.release.tag_name, 'rust-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: |
          cp README.md sdk/rust/README.md
          cd sdk/rust
          cargo publish --token "$CRATES_TOKEN"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-maven:
    if: startsWith(github.event.release.tag_name, 'java-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - run: mvn -B deploy -DskipTests -Prelease
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  publish-nuget:
    if: startsWith(github.event.release.tag_name, 'csharp-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/csharp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore AnyVali.sln
      - run: dotnet build AnyVali.sln --configuration Release --no-restore
      - run: dotnet pack --configuration Release --no-build -o nupkgs
      - run: dotnet nuget push nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-rubygems:
    if: contains(github.event.release.tag_name, 'ruby')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ruby
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build and publish gem
        run: |
          cp ../../README.md README.md
          mkdir -p ~/.gem
          cat <<CRED > ~/.gem/credentials
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          CRED
          chmod 0600 ~/.gem/credentials
          gem build anyvali.gemspec
          gem push anyvali-*.gem
          rm -f ~/.gem/credentials

  publish-kotlin:
    if: startsWith(github.event.release.tag_name, 'kotlin-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/kotlin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        run: |
          if [[ -x ./gradlew ]]; then
            ./gradlew --no-daemon publishToMavenCentral
          else
            gradle --no-daemon publishToMavenCentral
          fi
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  split-php:
    if: startsWith(github.event.release.tag_name, 'php-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Copy README into PHP SDK
        run: cp README.md sdk/php/README.md
      - uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PHP_SPLIT_DEPLOY_KEY }}
        with:
          source-directory: sdk/php
          destination-github-username: BetterCorp
          destination-repository-name: anyvali-php
          target-branch: main
          create-target-branch-if-needed: true
