name: Force Publish SDKs

on:
  workflow_dispatch:
    inputs:
      all:
        description: Publish all registry-backed SDKs
        required: true
        default: true
        type: boolean
      js:
        description: Publish JavaScript SDK to npm
        required: true
        default: false
        type: boolean
      python:
        description: Publish Python SDK to PyPI
        required: true
        default: false
        type: boolean
      go:
        description: Verify Go module tag
        required: true
        default: false
        type: boolean
      java:
        description: Publish Java SDK to Maven Central
        required: true
        default: false
        type: boolean
      kotlin:
        description: Publish Kotlin SDK to Maven Central
        required: true
        default: false
        type: boolean
      rust:
        description: Publish Rust SDK to crates.io
        required: true
        default: false
        type: boolean
      csharp:
        description: Publish C# SDK to NuGet
        required: true
        default: false
        type: boolean
      ruby:
        description: Publish Ruby SDK to RubyGems
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    if: inputs.all || inputs.js
    uses: ./.github/workflows/release-npm.yml
    secrets: inherit

  publish-pypi:
    if: inputs.all || inputs.python
    uses: ./.github/workflows/release-pypi.yml
    secrets: inherit

  publish-go:
    if: inputs.all || inputs.go
    uses: ./.github/workflows/release-go.yml
    secrets: inherit

  publish-maven:
    if: inputs.all || inputs.java
    uses: ./.github/workflows/release-maven.yml
    secrets: inherit

  publish-kotlin:
    if: inputs.all || inputs.kotlin
    uses: ./.github/workflows/release-kotlin.yml
    secrets: inherit

  publish-crates:
    if: inputs.all || inputs.rust
    uses: ./.github/workflows/release-crates.yml
    secrets: inherit

  publish-nuget:
    if: inputs.all || inputs.csharp
    uses: ./.github/workflows/release-nuget.yml
    secrets: inherit

  publish-rubygems:
    if: inputs.all || inputs.ruby
    uses: ./.github/workflows/release-rubygems.yml
    secrets: inherit
