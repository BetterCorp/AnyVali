name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Pull requests from forks get read-only access and no secrets.
# Only push events to master upload coverage.
permissions:
  contents: read

jobs:
  # Skip CI for release commits (changelog/version bumps committed by build-release)
  check:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          if [[ "$EVENT_NAME" == "push" && "$FIRST_LINE" == "chore: release"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping CI for release commit"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  js:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        node-version: [22, 24]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json
      - run: chmod +x runner.sh
      - run: ./runner.sh ci js
      - run: ./runner.sh coverage js
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.node-version == 24
        with:
          directory: sdk/js/coverage
          flags: js
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  python:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - run: python -m pip install --upgrade pip build pytest pytest-cov
      - run: chmod +x runner.sh
      - run: ./runner.sh ci python
      - run: ./runner.sh coverage python
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.python-version == '3.12'
        with:
          files: sdk/python/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  go:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdk/go/go.sum
      - run: chmod +x runner.sh
      - run: ./runner.sh ci go
      - run: ./runner.sh coverage go
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.go-version == '1.22'
        with:
          files: sdk/go/coverage.out
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  java:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        java-version: ["17", "21"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven
      - run: chmod +x runner.sh
      - run: ./runner.sh ci java
      - run: ./runner.sh coverage java
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.java-version == '17'
        with:
          files: sdk/java/target/site/jacoco/jacoco.xml
          flags: java
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  csharp:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('sdk/csharp/**/*.csproj') }}
          restore-keys: nuget-
      - run: chmod +x runner.sh
      - run: ./runner.sh ci csharp
      - run: ./runner.sh coverage csharp
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push'
        with:
          directory: sdk/csharp
          flags: csharp
          files: "**/*cobertura*.xml"
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  rust:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        toolchain: [stable, nightly]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rust
      - run: chmod +x runner.sh
      - run: ./runner.sh ci rust
      - name: Coverage (stable only)
        if: matrix.toolchain == 'stable'
        run: |
          cargo install cargo-llvm-cov --locked 2>/dev/null || true
          ./runner.sh coverage rust
        continue-on-error: true
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.toolchain == 'stable'
        with:
          files: sdk/rust/lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  php:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        php-version: ["8.1", "8.3"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: xdebug
      - uses: actions/cache@v5
        with:
          path: sdk/php/vendor
          key: composer-${{ matrix.php-version }}-${{ hashFiles('sdk/php/composer.lock') }}
          restore-keys: composer-${{ matrix.php-version }}-
      - run: chmod +x runner.sh
      - run: ./runner.sh ci php
      - run: ./runner.sh coverage php
        if: matrix.php-version == '8.3'
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.php-version == '8.3'
        with:
          files: sdk/php/coverage.xml
          flags: php
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  ruby:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        ruby-version: ["3.2", "3.3"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdk/ruby
      - run: chmod +x runner.sh
      - run: ./runner.sh ci ruby
      - run: ./runner.sh coverage ruby
        if: matrix.ruby-version == '3.3'
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && matrix.ruby-version == '3.3'
        with:
          files: sdk/ruby/coverage/coverage.xml
          flags: ruby
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  kotlin:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x runner.sh
      - run: ./runner.sh ci kotlin
      - run: ./runner.sh coverage kotlin
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push'
        with:
          files: sdk/kotlin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: kotlin
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  cpp:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        compiler:
          - { cc: gcc-12, cxx: g++-12 }
          - { cc: clang-15, cxx: clang++-15 }
    defaults:
      run:
        shell: bash
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x runner.sh
      - run: ./runner.sh ci cpp

  cli:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - name: Build CLI
        run: cd cli && go build -o anyvali .
      - name: Test CLI
        run: cd cli && go test -v ./... 2>&1
      - name: Verify binary
        run: ./cli/anyvali version

  conformance:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [check, js, python, go, java, csharp, rust, php, ruby, kotlin, cpp, cli]
    if: always() && needs.check.outputs.should_run == 'true'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/go.sum
      - run: chmod +x runner.sh
      - run: ./runner.sh conformance
