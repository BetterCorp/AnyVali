name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      description: Which SDK does this apply to?
      options:
        - JavaScript / TypeScript
        - Python
        - Go
        - Java
        - "C#"
        - Rust
        - PHP
        - Ruby
        - Kotlin
        - C++
        - Core / Spec
        - Multiple / All
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of feature is this?
      options:
        - New validation rule
        - New schema keyword
        - Performance improvement
        - Developer experience
        - Error messages
        - Documentation
        - Tooling / CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is there a workaround today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or API you would like.
      placeholder: |
        Example API:
        ```
        schema.validate(input, { strict: true })
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you have considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or references.
    validations:
      required: false
