name: Bug Report
description: Report a bug in anyvali
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below so we can investigate.

  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      description: Which SDK are you using?
      options:
        - JavaScript / TypeScript
        - Python
        - Go
        - Java
        - "C#"
        - Rust
        - PHP
        - Ruby
        - Kotlin
        - C++
        - Multiple / All
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SDK Version
      description: What version of the SDK are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal code example or steps to reproduce the issue.
      placeholder: |
        1. Create a schema with ...
        2. Validate the input ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Runtime: Node.js 20.10.0
        - Architecture: x86_64
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
